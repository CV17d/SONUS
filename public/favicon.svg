<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="s" x1="16" y1="12" x2="48" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a3a6ff"/>
      <stop offset="50%" stop-color="#7c7fff"/>
      <stop offset="100%" stop-color="#b388ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="url(#s)" stroke-width="2" opacity="0.9"/>
  <!-- Inner glow ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="url(#s)" stroke-width="0.5" opacity="0.3"/>
  <!-- Stylized S letter -->
  <g filter="url(#glow)">
    <path d="M 40 18 C 40 18 38 14 32 14 C 24 14 20 19 20 24 C 20 30 25 32 32 34 C 39 36 44 38 44 44 C 44 50 38 52 32 52 C 26 52 22 48 22 48" 
      stroke="url(#s)" stroke-width="5" stroke-linecap="round" fill="none"/>
  </g>
  <!-- Sound wave dots -->
  <circle cx="12" cy="32" r="2" fill="#a3a6ff" opacity="0.6"/>
  <circle cx="8" cy="32" r="1.2" fill="#a3a6ff" opacity="0.3"/>
  <circle cx="52" cy="32" r="2" fill="#b388ff" opacity="0.6"/>
  <circle cx="56" cy="32" r="1.2" fill="#b388ff" opacity="0.3"/>
</svg>